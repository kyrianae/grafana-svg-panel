services:
  grafana:
    user: root
    container_name: kyrianae-svg-panel-panel
    build:
      context: .
      dockerfile: Dockerfile
      args:
        grafana_image: ${GRAFANA_IMAGE:-grafana-enterprise}
        grafana_version: ${GRAFANA_VERSION:-12.4.0}
        development: ${DEVELOPMENT:-false}
        anonymous_auth_enabled: ${ANONYMOUS_AUTH_ENABLED:-true}
    ports:
      - 3000:3000/tcp
    volumes:
      - ./dist:/var/lib/grafana/plugins/kyrianae-svg-panel-panel
      - ./provisioning:/etc/grafana/provisioning
      - .:/root/kyrianae-svg-panel-panel
    environment:
      NODE_ENV: development
      GF_LOG_FILTERS: plugin.kyrianae-svg-panel-panel:debug
      GF_LOG_LEVEL: debug
      GF_DATAPROXY_LOGGING: 1
      GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS: kyrianae-svg-panel-panel

  node:
    image: node:22-bookworm
    working_dir: /workspace
    volumes:
      - .:/workspace
    environment:
      NODE_ENV: development
